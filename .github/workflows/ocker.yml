name: CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: promo-flow-app

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and Push Image
        id: image
        run: |
          IMAGE=${{ secrets.DOCKER_HUB_USERNAME }}/promo-flow-app:${{ github.sha }}
          docker build -t $IMAGE .
          docker push $IMAGE
          echo "tag=$IMAGE" >> $GITHUB_OUTPUT

  deploy-dev:
    runs-on: ubuntu-latest
    needs: build
    environment: dev
    steps:
      - name: Deploy to Dev
        run: |
          echo "Deploying ${{ needs.build.outputs.image }} to DEV"

  deploy-qa:
    runs-on: ubuntu-latest
    needs: deploy-dev
    environment: qa
    steps:
      - name: Deploy to QA
        run: |
          echo "Deploying ${{ needs.build.outputs.image }} to QA"

  deploy-prod:
    runs-on: ubuntu-latest
    needs: deploy-qa
    environment: prod
    steps:
      - name: Deploy to Production
        run: |
          echo "Deploying ${{ needs.build.outputs.image }} to PROD"
